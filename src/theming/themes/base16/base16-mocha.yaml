display-name: Base16 Mocha
variant: dark

# ─── Core palette ────────────────────────────────────────────────────────────
# Dynamic Base16 Template
window: "#534636" # Background (Alternate Dark)
panel: "#3B3228b3" # Default Background with legacy alpha
overlay: "#64524088" # Selection Background with legacy alpha

soft: "#7e705a" # Comments, Invisibles, Highlighting
solid: "#3B3228" # Default Background

shadow: "#00000033"
shadow-soft: "#0000001a"

accent: "#d28b71" # Integers, Boolean, Constants (Orange-ish)
accent-text: "#3B3228" # High contrast return to background

accent-soft: "#bb9584cc" # Deprecated, Opening/Closing Embedded Tags
accent-softer: "#bb9584bb"
accent-softest: "#f4bc8711" # Classes, Keywords (Yellow-ish)

accent-play: "#beb55b" # Strings, Inherited Class (Green-ish)
accent-love: "#cb6077" # Variables, XML Tags (Red-ish)

library-hover: "#7e705a99"
library-highlight: "#7bbda4cc" # Support, Regular Expressions (Cyan-ish)

menu: "#534636cc"
menu-hover: "#d0c8c611"

shuffle: "#a89bb9" # Operators, Punctuation (Purple-ish)
repeat: "#beb55b"

waveform: "#8ab3b5" # Functions, Methods (Blue-ish)
waveform-progress: "#7bbda4"

primary: "#d0c8c6ee" # Default Text
secondary: "#a89bb9" # Operators/Secondary Text
muted: "#d0c8c666"
inactive: "#645240" # Selection Background

border: "#d0c8c622" # Subtle borders using text color
destructive: "#cb6077" # Base08 (Red)
positive: "#beb55b" # Base0B (Green)
warning: "#d28b71" # Base09 (Orange)
