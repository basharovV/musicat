display-name: Base16 Nord
variant: dark

# ─── Core palette ────────────────────────────────────────────────────────────
# Dynamic Base16 Template
window: "#3B4252" # Background (Alternate Dark)
panel: "#2E3440b3" # Default Background with legacy alpha
overlay: "#434C5E88" # Selection Background with legacy alpha

soft: "#4C566A" # Comments, Invisibles, Highlighting
solid: "#2E3440" # Default Background

shadow: "#00000033"
shadow-soft: "#0000001a"

accent: "#D08770" # Integers, Boolean, Constants (Orange-ish)
accent-text: "#2E3440" # High contrast return to background

accent-soft: "#5E81ACcc" # Deprecated, Opening/Closing Embedded Tags
accent-softer: "#5E81ACbb"
accent-softest: "#EBCB8B11" # Classes, Keywords (Yellow-ish)

accent-play: "#A3BE8C" # Strings, Inherited Class (Green-ish)
accent-love: "#BF616A" # Variables, XML Tags (Red-ish)

library-hover: "#4C566A99"
library-highlight: "#88C0D0cc" # Support, Regular Expressions (Cyan-ish)

menu: "#3B4252cc"
menu-hover: "#E5E9F011"

shuffle: "#B48EAD" # Operators, Punctuation (Purple-ish)
repeat: "#A3BE8C"

waveform: "#81A1C1" # Functions, Methods (Blue-ish)
waveform-progress: "#88C0D0"

primary: "#E5E9F0ee" # Default Text
secondary: "#B48EAD" # Operators/Secondary Text
muted: "#E5E9F066"
inactive: "#434C5E" # Selection Background

border: "#E5E9F022" # Subtle borders using text color
destructive: "#BF616A" # Base08 (Red)
positive: "#A3BE8C" # Base0B (Green)
warning: "#D08770" # Base09 (Orange)
