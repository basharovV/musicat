display-name: Base16 Nord Light
variant: light

# ─── Core palette ────────────────────────────────────────────────────────────
# Dynamic Base16 Template
window: "#c2d0e7" # Background (Alternate Dark)
panel: "#e5e9f0b3" # Default Background with legacy alpha
overlay: "#b8c5db88" # Selection Background with legacy alpha

soft: "#aebacf" # Comments, Invisibles, Highlighting
solid: "#e5e9f0" # Default Background

shadow: "#00000033"
shadow-soft: "#0000001a"

accent: "#ac4426" # Integers, Boolean, Constants (Orange-ish)
accent-text: "#e5e9f0" # High contrast return to background

accent-soft: "#5272afcc" # Deprecated, Opening/Closing Embedded Tags
accent-softer: "#5272afbb"
accent-softest: "#9a750011" # Classes, Keywords (Yellow-ish)

accent-play: "#4f894c" # Strings, Inherited Class (Green-ish)
accent-love: "#99324b" # Variables, XML Tags (Red-ish)

library-hover: "#aebacf99"
library-highlight: "#398eaccc" # Support, Regular Expressions (Cyan-ish)

menu: "#c2d0e7cc"
menu-hover: "#2e344011"

shuffle: "#97365b" # Operators, Punctuation (Purple-ish)
repeat: "#4f894c"

waveform: "#3b6ea8" # Functions, Methods (Blue-ish)
waveform-progress: "#398eac"

primary: "#2e3440ee" # Default Text
secondary: "#97365b" # Operators/Secondary Text
muted: "#2e344066"
inactive: "#b8c5db" # Selection Background

border: "#2e344022" # Subtle borders using text color
destructive: "#99324b" # Base08 (Red)
positive: "#4f894c" # Base0B (Green)
warning: "#ac4426" # Base09 (Orange)
